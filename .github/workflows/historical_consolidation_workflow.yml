name: Historical Yearly Consolidation (Backfill)
on:
  workflow_dispatch:  # Manual trigger
    inputs:
      symbol:
        description: 'Symbol to process (leave empty for all symbols)'
        required: false
        default: ''
        type: string

jobs:
  historical-consolidation:
    runs-on: ubuntu-latest
    env:
      MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
      MINIO_KEY:       ${{ secrets.MINIO_KEY }}
      MINIO_SECRET:    ${{ secrets.MINIO_SECRET }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Report job configuration
        run: |
          echo "Symbol: ${{ github.event.inputs.symbol || 'ALL SYMBOLS' }}"
          echo "Triggered by: ${{ github.actor }}"
      
      - name: Install tools and dependencies
        run: |
          set -euo pipefail
          pip install polars pyarrow pyyaml

          MC_PATH=/usr/local/bin/mc
          MC_URL="https://github.com/minio/mc/releases/latest/download/mc-linux-amd64"

          echo "Downloading mc from $MC_URL"
          curl -fL --retry 3 --retry-delay 2 "$MC_URL" -o "$MC_PATH" \
            || {
              echo "[WARN] Primary download failed; attempting fallback to dl.min.io"
              curl -fL --retry 3 --retry-delay 2 "https://dl.min.io/client/mc/release/linux-amd64/mc" -o "$MC_PATH"
            }

          chmod +x "$MC_PATH"

          if ! "$MC_PATH" --version >/dev/null 2>&1 ; then
            echo "[ERROR] mc binary invalid or not executable."
            head -c 200 "$MC_PATH" || true
            exit 1
          fi

          echo "[INFO] mc installed: $($MC_PATH --version)"
          for i in 1 2 3 4 5; do
            if mc alias set myminio "$MINIO_ENDPOINT" "$MINIO_KEY" "$MINIO_SECRET"; then
              echo "[INFO] mc alias set succeeded (attempt $i)"
              break
            fi
            if [ $i -eq 5 ]; then
              echo "[ERROR] mc alias set failed after 5 attempts"
              exit 1
            fi
            echo "[WARN] mc alias set failed (attempt $i/5), retrying in 30s"
            sleep 30
          done
      
      - name: Run historical yearly consolidation
        run: |
          echo "Starting historical consolidation..."
          
          # Build command
          CMD="python historical_consolidation_script.py --symbol NIKKEI"
          
          # Add symbol filter if specified
          if [ -n "${{ github.event.inputs.symbol }}" ]; then
            CMD="$CMD --symbol ${{ github.event.inputs.symbol }}"
          fi
          
          echo "Executing: $CMD"
          $CMD
          
          echo "Historical consolidation completed"
      
      - name: Upload consolidated yearly files to MinIO
        run: |
          if [ -d "ohlcv/1Y" ]; then
            echo "Uploading consolidated yearly files to MinIO..."
            mc mirror ohlcv/1Y/ myminio/dukascopy-node/ohlcv/1Y/ --overwrite
            echo "Upload completed"
          else
            echo "No yearly files to upload"
          fi
