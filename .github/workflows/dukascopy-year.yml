name: Dukascopy Yearly Consolidation
on:
  workflow_run:
    workflows: ["Dukascopy gap-fill 1m"]  # Must match exactly the name in dukascopy-ingest.yml
    types: [completed]
    branches: [main]
  workflow_dispatch:  # Keep manual trigger for testing
    inputs:
      from_date:
        description: 'Refresh current-year daily files from YYYY-MM-DD'
        required: false
        default: ''
        type: string
      to_date:
        description: 'Refresh current-year daily files through YYYY-MM-DD'
        required: false
        default: ''
        type: string
      symbols:
        description: 'Comma-separated symbols (leave empty for all)'
        required: false
        default: ''
        type: string

jobs:
  consolidate:
    runs-on: ubuntu-latest
    # Run if daily ingest was successful OR if manually triggered
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    env:
      MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
      MINIO_KEY:       ${{ secrets.MINIO_KEY }}
      MINIO_SECRET:    ${{ secrets.MINIO_SECRET }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Report trigger status
        run: |
          echo "Triggered by workflow: ${{ github.event.workflow_run.workflow_id }}"
          echo "Daily ingest status: ${{ github.event.workflow_run.conclusion }}"
          echo "Daily ingest run: ${{ github.event.workflow_run.html_url }}"
      
      - name: Install tools and dependencies
        run: |
          set -euo pipefail
          pip install polars pyarrow pyyaml yq

          MC_PATH=/usr/local/bin/mc
          MC_URL="https://github.com/minio/mc/releases/latest/download/mc-linux-amd64"

          echo "Downloading mc from $MC_URL"
          curl -fL --retry 3 --retry-delay 2 "$MC_URL" -o "$MC_PATH" \
            || {
              echo "[WARN] Primary download failed; attempting fallback to dl.min.io"
              curl -fL --retry 3 --retry-delay 2 "https://dl.min.io/client/mc/release/linux-amd64/mc" -o "$MC_PATH"
            }

          chmod +x "$MC_PATH"

          if ! "$MC_PATH" --version >/dev/null 2>&1 ; then
            echo "[ERROR] mc binary invalid or not executable."
            head -c 200 "$MC_PATH" || true
            exit 1
          fi

          echo "[INFO] mc installed: $($MC_PATH --version)"
          for i in 1 2 3 4 5; do
            if mc alias set myminio "$MINIO_ENDPOINT" "$MINIO_KEY" "$MINIO_SECRET"; then
              echo "[INFO] mc alias set succeeded (attempt $i)"
              break
            fi
            if [ $i -eq 5 ]; then
              echo "[ERROR] mc alias set failed after 5 attempts"
              exit 1
            fi
            echo "[WARN] mc alias set failed (attempt $i/5), retrying in 30s"
            sleep 30
          done
      
      - name: Download existing yearly files and smart daily sync
        run: |
          CURRENT_YEAR=$(date +%Y)
          echo "Downloading existing yearly files for $CURRENT_YEAR"
          
          # Step 1: Download existing yearly files for current year only
          if [ -n "${{ github.event.inputs.symbols }}" ]; then
            SYMS=$(echo "${{ github.event.inputs.symbols }}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          else
            SYMS=$(yq 'keys | .[]' symbols.yaml | tr -d '"')
          fi

          REFRESH_ARGS=""
          if [ -n "${{ github.event.inputs.from_date }}" ]; then
            REFRESH_ARGS="--refresh-from ${{ github.event.inputs.from_date }}"
            if [ -n "${{ github.event.inputs.to_date }}" ]; then
              REFRESH_ARGS="$REFRESH_ARGS --refresh-to ${{ github.event.inputs.to_date }}"
            fi
          fi

          mkdir -p ohlcv/1Y
          
          for SYMBOL in $SYMS; do
            # Check if yearly file exists for this symbol and current year
            YEARLY_PATH="myminio/dukascopy-node/ohlcv/1Y/symbol=$SYMBOL/year=$CURRENT_YEAR/${SYMBOL}_${CURRENT_YEAR}.parquet"
            if mc stat "$YEARLY_PATH" >/dev/null 2>&1; then
              echo "[INFO] Downloading existing yearly file for $SYMBOL"
              LOCAL_DIR="ohlcv/1Y/symbol=$SYMBOL/year=$CURRENT_YEAR"
              mkdir -p "$LOCAL_DIR"
              mc cp "$YEARLY_PATH" "$LOCAL_DIR/"
            else
              echo "[INFO] No existing yearly file for $SYMBOL - will create new"
            fi
          done
          
          # Step 2: Smart download for each symbol
          for SYMBOL in $SYMS; do
            echo "[INFO] Smart downloading for $SYMBOL"
            python yearly_consolidation.py --download-only --symbol "$SYMBOL" $REFRESH_ARGS
          done
      
      - name: Run consolidation
        run: |
          echo "Running yearly consolidation"
          REFRESH_ARGS=""
          if [ -n "${{ github.event.inputs.from_date }}" ]; then
            REFRESH_ARGS="--refresh-from ${{ github.event.inputs.from_date }}"
            if [ -n "${{ github.event.inputs.to_date }}" ]; then
              REFRESH_ARGS="$REFRESH_ARGS --refresh-to ${{ github.event.inputs.to_date }}"
            fi
          fi
          python yearly_consolidation.py --consolidate-only $REFRESH_ARGS
      
      - name: Upload updated yearly files
        run: |
          if [ -d ohlcv/1Y ]; then
            echo "Uploading updated yearly files to MinIO"
            mc mirror --overwrite ohlcv/1Y/ myminio/dukascopy-node/ohlcv/1Y/
          else
            echo "No yearly files to upload"
          fi

  workflow-keepalive:
    # if: github.event_name == 'schedule'
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1.2.1
